name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  plan:
    name: CI Plan
    runs-on: ubuntu-latest
    outputs:
      tinx_outputs: ${{ steps.tinx-plan.outputs.outputs-json }}
    steps:
      - uses: actions/checkout@v4

      - id: tinx-plan
        uses: sourceplane/tinx-action@v1
        with:
          run: ghcr.io/sourceplane/lite-ci:v0.2.24 plan --config-dir ~/.tinx/providers/sourceplane/lite-ci/v0.2.24/assets/config/compositions --view dag
          artifacts: plan.json
          outputs: |
              matrix=plan.json


  execute:
    name: Run
    needs: plan
    if: ${{ fromJson(fromJson(needs.plan.outputs.tinx_outputs).matrix).jobs != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(format('{{"include":{0}}}', toJson(fromJson(fromJson(needs.plan.outputs.tinx_outputs).matrix).jobs))) }}

    runs-on: ${{ matrix.metadata.runsOn || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tinx-artifacts

      - uses: sourceplane/tinx-action@v1
        with:
          run: ghcr.io/sourceplane/lite-ci:v0.2.24 run --plan plan.json --job-id "${{ matrix.id }}"
